font_family MesloLGS Nerd Font Mono
font_size 14

cursor_shape block
cursor_blink_interval 0

cursor_trail 1
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 0

scrollback_lines 10000

mouse_hide_wait -1

url_style double

copy_on_select yes

enable_audio_bell no

enabled_layouts Splits, *
window_padding_width 4 8 4 8
placement_strategy top-left
hide_window_decorations titlebar-only
confirm_os_window_close 0

allow_remote_control yes
listen_on unix:/tmp/kitty

tab_bar_edge top
tab_bar_style custom

tab_bar_margin_width 8
tab_bar_margin_height 4 0

tab_bar_min_tabs 1
tab_switch_strategy previous

# Only show tabs from the currently active session
tab_bar_filter session:~ or session:^$

background_opacity 0.85
background_blur 30

auto_reload_config -1

shell_integration enabled
term xterm-kitty

macos_option_as_alt both

startup_session sessions/main.kitty-session

# Disable middle-click paste
mouse_map middle release ungrabbed

map ctrl+cmd+, load_config_file

map opt+a>c launch --type=tab --cwd=current

map opt+a>- kitten split_window.py bottom
map opt+a>\ kitten split_window.py right

map ctrl+h kitten neighboring_window.py left
map ctrl+j kitten neighboring_window.py bottom
map ctrl+k kitten neighboring_window.py top
map ctrl+l kitten neighboring_window.py right

map --when-focus-on var:IS_NVIM ctrl+h
map --when-focus-on var:IS_NVIM ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k
map --when-focus-on var:IS_NVIM ctrl+l

map opt+h kitten relative_resize.py left  3
map opt+j kitten relative_resize.py down  3
map opt+k kitten relative_resize.py up    3
map opt+l kitten relative_resize.py right 3

map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+l

map ctrl+backslash kitten last_active_window.py
map --when-focus-on var:IS_NVIM ctrl+backslash

map ctrl+m toggle_layout stack

map ctrl+cmd+h move_window left
map ctrl+cmd+j move_window down
map ctrl+cmd+k move_window up
map ctrl+cmd+l move_window right

map kitty_mod+w close_window

map kitty_mod+h previous_tab
map kitty_mod+l next_tab

map kitty_mod+, move_tab_backward
map kitty_mod+. move_tab_forward

map opt+a>1 goto_tab 1
map opt+a>2 goto_tab 2
map opt+a>3 goto_tab 3
map opt+a>4 goto_tab 4
map opt+a>5 goto_tab 5
map opt+a>6 goto_tab 6
map opt+a>7 goto_tab 7
map opt+a>8 goto_tab 8
map opt+a>9 goto_tab 9

map kitty_mod+m kitten goto_session.py main
map kitty_mod+n kitten goto_session.py notes
map kitty_mod+d kitten goto_session.py dotfiles

map opt+a>l goto_session -1

# Session switcher
action_alias launch_session_select launch --type=overlay zsh -c "$HOME/.config/kitty/scripts/kitty-list-sessions.sh"
map opt+a>space launch_session_select

# Create a new session with zoxide
action_alias launch_zoxide_session launch --type=overlay zsh -c "$HOME/.config/kitty/scripts/kitty-zoxide-session.sh"
map opt+a>z launch_zoxide_session

# Open the scrollback buffer in Neovim
action_alias kitty_scrollback launch --stdin-source=@screen_scrollback --stdin-add-formatting --type=overlay zsh -c "SCROLLBACK_MODE=1 nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'xnoremap q <Esc>ZQ' +'call nvim_open_term(0, {})' +'set nonumber norelativenumber signcolumn=no laststatus=0' +'$' -"
map kitty_mod+k kitty_scrollback

# Copy the output of the last command to the clipboard
map shift+cmd+c launch --stdin-source=@last_cmd_output --type=clipboard

include theme.conf
